services:
  aisolver:
    build:
      context: https://github.com/sourav3688/ai-solver-server.git
    image: aisolver:latest
    container_name: ai-solver-serv
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MODEL_NAME=gpt-5.2

  nginx:
    image: nginx:latest
    container_name: ai-solver-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - aisolver